<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiSethu - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .error {
            color: #e53e3e;
            margin-top: 10px;
            text-align: center;
        }
        .success {
            color: #38a169;
            margin-top: 10px;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create password" required>
            </div>
            <div class="form-group">
                <label for="role">I am a</label>
                <select id="role" required>
                    <option value="farmer">Farmer</option>
                    <option value="buyer">Buyer</option>
                </select>
            </div>
            <div class="form-group" id="farmerFields">
                <label for="village">Village (for farmers)</label>
                <input type="text" id="village" placeholder="Enter your village">
            </div>
            <div class="form-group" id="buyerFields" style="display: none;">
                <label for="business_name">Business Name (for buyers)</label>
                <input type="text" id="business_name" placeholder="Enter business name">
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="Enter your address" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
            <div id="message" class="error"></div>
        </form>
        <div class="link">
            Already have an account? <a href="/public/login.html">Sign In</a>
        </div>
    </div>

    <script>
        // Toggle fields based on role
        document.getElementById('role').addEventListener('change', function() {
            if (this.value === 'farmer') {
                document.getElementById('farmerFields').style.display = 'block';
                document.getElementById('buyerFields').style.display = 'none';
                document.getElementById('village').required = true;
                document.getElementById('business_name').required = false;
            } else {
                document.getElementById('farmerFields').style.display = 'none';
                document.getElementById('buyerFields').style.display = 'block';
                document.getElementById('village').required = false;
                document.getElementById('business_name').required = true;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.getElementById('role').value;
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                role: role,
                address: document.getElementById('address').value
            };
            if (role === 'farmer') {
                payload.village = document.getElementById('village').value;
            } else {
                payload.business_name = document.getElementById('business_name').value;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const messageDiv = document.getElementById('message');

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    messageDiv.className = 'success';
                    messageDiv.textContent = 'Registration successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    messageDiv.className = 'error';
                    messageDiv.textContent = data.error || 'Registration failed';
                }
            } catch (error) {
                document.getElementById('message').className = 'error';
                document.getElementById('message').textContent = 'Network error. Please try again.';
            }
        });
    </script>
</body>
</html>
